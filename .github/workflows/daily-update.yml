name: Daily README Update

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  schedule:
    - cron: "0 0 * * *"   # Runs daily (UTC time)
  workflow_dispatch:       # Allow manual run

jobs:
  update-readme:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Update README
        run: |
          echo "Last updated: $(date)" >> README.md

      - name: Commit changes
        run: |
          git config --global user.name "warda-qasim"
          git config --global user.email "warda.qasim02@gmail.com"
          git add README.md
          git commit -m "Daily README update" || echo "No changes to commit"
          git push